server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: erp-server
  datasource:
    # 本机开发默认连接本地 MySQL；需要连接服务器时通过 DB_URL、DB_USERNAME、DB_PASSWORD 覆盖。
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/group_project?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:erp_local}
    password: ${DB_PASSWORD:ErpLocal@2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET:b2b-erp-system-jwt-secret-key-2026-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "
